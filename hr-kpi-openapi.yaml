openapi: "3.0.0"
info:
  title: "HR KPI Portal API"
  version: "1.0.0"
servers:
  - url: "https://hyhpioojtqyegtqziwur.supabase.co/rest/v1"
paths:
  /employees:
    get:
      operationId: "getEmployees"
      summary: "Get all employees"
      parameters:
        - name: "select"
          in: "query"
          schema:
            type: "string"
        - name: "division"
          in: "query"
          schema:
            type: "string"
        - name: "order"
          in: "query"
          schema:
            type: "string"
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
      responses:
        "200":
          description: "List of employees"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
    post:
      operationId: "createEmployee"
      summary: "Create employee"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
      responses:
        "201":
          description: "Created"
  /performance_scores:
    get:
      operationId: "getPerformanceScores"
      summary: "Get performance scores"
      parameters:
        - name: "select"
          in: "query"
          schema:
            type: "string"
        - name: "emp_id"
          in: "query"
          schema:
            type: "string"
        - name: "eval_period"
          in: "query"
          schema:
            type: "string"
        - name: "order"
          in: "query"
          schema:
            type: "string"
      responses:
        "200":
          description: "List of scores"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
    post:
      operationId: "createPerformanceScore"
      summary: "Create performance score"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
      responses:
        "201":
          description: "Created"
  /leave_discipline_stats:
    get:
      operationId: "getLeaveDisciplineStats"
      summary: "Get leave and discipline stats"
      parameters:
        - name: "select"
          in: "query"
          schema:
            type: "string"
        - name: "emp_id"
          in: "query"
          schema:
            type: "string"
        - name: "eval_period"
          in: "query"
          schema:
            type: "string"
      responses:
        "200":
          description: "List of stats"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
    post:
      operationId: "createLeaveDisciplineStat"
      summary: "Create leave discipline stat"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
      responses:
        "201":
          description: "Created"
  /portal_users:
    get:
      operationId: "getPortalUsers"
      summary: "Get portal users"
      parameters:
        - name: "select"
          in: "query"
          schema:
            type: "string"
        - name: "role"
          in: "query"
          schema:
            type: "string"
      responses:
        "200":
          description: "List of users"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
    post:
      operationId: "createPortalUser"
      summary: "Create portal user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
      responses:
        "201":
          description: "Created"
